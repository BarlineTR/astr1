rplidar_node:
  ros__parameters:
    serial_port: "/dev/astro_lidar"
    serial_baudrate: 115200
    frame_id: "laser_frame"
    angle_compensate: true
    scan_mode: "Standard"

scan_filter_node:
  ros__parameters:
    range_min: 0.15
    range_max: 12.0
    filter_nan: true
    input_topic: "/scan"
    output_topic: "/scan_filtered"
