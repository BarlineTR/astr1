serial_bridge:
  ros__parameters:
    port: "/dev/astro_arduino"
    baud: 500000
    frame_id_imu: "imu_link"
    ticks_per_rev_left: 2048.0
    ticks_per_rev_right: 2048.0
    wheel_radius_left: 0.06
    wheel_radius_right: 0.06

rplidar_node:
  ros__parameters:
    serial_port: "/dev/astro_lidar"
    serial_baudrate: 115200
    frame_id: "laser_frame"
    angle_compensate: true
    scan_mode: "Standard"

scan_filter_node:
  ros__parameters:
    range_min: 0.15
    range_max: 12.0
    filter_nan: true

audio_capture_node:
  ros__parameters:
    device_name: "ReSpeaker"
    sample_rate: 16000
    channels: 6
    chunk_size: 1024
    vad_threshold: 0.6

speech_recognition_node:
  ros__parameters:
    model_path: "/opt/vosk/vosk-model-small-tr-0.3"
    language: "tr"
    partial_results: true

tts_node:
  ros__parameters:
    engine: "pyttsx3"
    language: "tr"
    rate: 150
    volume: 0.8

/oak:
  ros__parameters:
    camera:
      i_nn_type: "none"
      i_enable_imu: false
    i_pipeline_type: "RGBD"
    rgb:
      i_resolution: "720P"
      i_fps: 30
      i_publish_topic: true
    stereo:
      i_enabled: true
      i_depth_filter_size: 5
      i_lr_check: true

face_detector_node:
  ros__parameters:
    input_topic: "/oak/rgb/image_raw"
    scale_factor: 1.1
    min_neighbors: 5
    min_size: 30
